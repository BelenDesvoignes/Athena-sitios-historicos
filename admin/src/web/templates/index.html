<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena — Panel de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1E3A8A;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .landing-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 56px 48px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            backdrop-filter: blur(4px);
        }
        .brand {
            font-family: 'Nunito', sans-serif;
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
            margin-bottom: 8px;
        }
        .subtitle {
            color: rgba(255,255,255,0.65);
            font-size: 0.95rem;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .btn-main {
            display: block;
            width: 100%;
            padding: 13px;
            background: white;
            color: #1E3A8A;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            transition: background-color 0.2s;
            margin-bottom: 12px;
        }
        .btn-main:hover {
            background: #DBEAFE;
            color: #172554;
        }
        .btn-secondary-link {
            display: block;
            width: 100%;
            padding: 13px;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-secondary-link:hover {
            background: rgba(255,255,255,0.18);
            color: white;
        }
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 12px;
            color: rgba(255,255,255,0.35);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="landing-card">
        <div class="brand">Athena</div>
        <p class="subtitle">Gestión del Patrimonio Histórico Argentino</p>
        <a href="{{ url_for('user_admin.login') }}" class="btn-main">Iniciar Sesión</a>
        <a href="{{ url_for('user_admin.register') }}" class="btn-secondary-link">Registrarse</a>
    </div>

    <footer>&copy; 2025 Proyecto de Software</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
