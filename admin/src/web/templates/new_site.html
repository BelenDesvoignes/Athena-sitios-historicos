{% extends 'base_layout.html' %}

{% block title %}Crear Nuevo Sitio Histórico{% endblock %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<section class="container mt-5">
    <article>
        <h2>Crear Nuevo Sitio Histórico</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" enctype="multipart/form-data" action="{{ url_for('sitios.new') }}">
            <fieldset>
                <legend>Datos del sitio</legend>

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                </div>

                <div class="mb-3">
                    <label for="descripcion_breve" class="form-label">Descripción breve</label>
                    <input type="text" class="form-control" id="descripcion_breve" name="descripcion_breve" required>
                </div>

                <div class="mb-3">
                    <label for="descripcion_completa" class="form-label">Descripción completa</label>
                    <textarea class="form-control" id="descripcion_completa" name="descripcion_completa" rows="3" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="ciudad" class="form-label">Ciudad</label>
                    <input type="text" class="form-control" id="ciudad" name="ciudad" required>
                </div>

                <div class="mb-3">
                    <label for="provincia" class="form-label">Provincia</label>
                    <input type="text" class="form-control" id="provincia" name="provincia" required>
                </div>

                <div class="mb-3">
                    <label for="estado_conservacion" class="form-label">Estado de conservación</label>
                    <select class="form-select" id="estado_conservacion" name="estado_conservacion" required>
                        <option value="Bueno">Bueno</option>
                        <option value="Regular">Regular</option>
                        <option value="Malo">Malo</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="inauguracion" class="form-label">Año de inauguración</label>
                    <input type="number" class="form-control" id="inauguracion" name="inauguracion" required>
                </div>

                <div class="mb-3">
                    <label for="categoria" class="form-label">Categoría</label>
                    <input type="text" class="form-control" id="categoria" name="categoria" required>
                </div>

                <div class="mb-3">
                    <label for="tags" class="form-label">Tags</label>
                    <select id="tags" name="tags" class="form-select" multiple="multiple" style="width: 100%;">
                        {% for tag in tags %}
                        <option value="{{ tag.id }}">{{ tag.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3 form-check mt-3">
                    <input type="checkbox" class="form-check-input" id="visible" name="visible" value="1">
                    <label class="form-check-label" for="visible">Visible</label>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ubicación en el mapa</label>
                    <div id="map" style="height: 400px; width: 100%;"></div>
                    <input type="hidden" name="latitud" id="latitud">
                    <input type="hidden" name="longitud" id="longitud">
                </div>

                <fieldset>
                    <legend>Imágenes del sitio (máx. 10)</legend>
                    <div class="mb-3">
                        <div class="custom-file-upload">
                            <label for="imagenes" class="btn btn-primary">📁 Seleccionar imágenes</label>
                            <input type="file" id="imagenes" name="imagenes" multiple accept=".jpg,.png,.webp">
                            <span id="file-count" class="ms-2 text-info"></span>
                        </div>
                    </div>
                    <input type="hidden" name="portada" id="portada-hidden" value="0">
                    <div id="imagenes-lista" class="d-flex flex-wrap" style="margin-top: 15px; gap: 10px;"></div>
                </fieldset>

            <button type="submit" class="btn btn-success">Guardar sitio</button>
            <a href="{{ url_for('sitios.list') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </article>
</section>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
$(document).ready(function() {
    $('#tags').select2({
        placeholder: "Selecciona uno o más tags",
        allowClear: true
    });
});

var map = L.map('map').setView([-34.6, -58.4], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);
let marker;

map.on('click', function(e) {
    if (marker) map.removeLayer(marker);
    marker = L.marker(e.latlng).addTo(map);
    document.getElementById('latitud').value = e.latlng.lat;
    document.getElementById('longitud').value = e.latlng.lng;
});

const inputImagenes = document.getElementById('imagenes');
const contenedor = document.getElementById('imagenes-lista');
const portadaHidden = document.getElementById('portada-hidden');
let archivosSeleccionados = [];

const EXT_PERMITIDAS = ["jpg", "png", "webp"];
const MAX_IMAGENES = 10; 
const MAX_BYTES = 5 * 1024 * 1024;

function extensionValida(nombre) {
    const ext = nombre.split('.').pop().toLowerCase();
    return EXT_PERMITIDAS.includes(ext);
}

function renderizarImagenes() {
    contenedor.innerHTML = "";

    archivosSeleccionados.forEach((fileObj, idx) => {
        const div = document.createElement('div');
        div.className = 'imagen-item bg-dark p-2 rounded';
        div.style.width = "180px";
        div.dataset.index = idx;

        const imgContainer = document.createElement('div');
        imgContainer.style.position = "relative";

        const img = document.createElement('img');
        img.src = URL.createObjectURL(fileObj.file);
        img.width = 160;
        img.height = 120;
        img.style.objectFit = "cover";
        img.style.borderRadius = "4px";
        imgContainer.appendChild(img);

        if (!fileObj.portada) {
            const botonEliminar = document.createElement('button');
            botonEliminar.type = "button";
            botonEliminar.textContent = "×";
            botonEliminar.className = "btn btn-sm btn-danger";
            botonEliminar.style.position = "absolute";
            botonEliminar.style.top = "5px";
            botonEliminar.style.right = "5px";
            botonEliminar.addEventListener('click', () => eliminarImagen(idx));
            imgContainer.appendChild(botonEliminar);
        }

        const portadaLabel = document.createElement('label');
        portadaLabel.className = "text-light mt-1";
        const portadaRadio = document.createElement('input');
        portadaRadio.type = "radio";
        portadaRadio.name = "portada_radio";
        portadaRadio.value = idx;
        portadaRadio.checked = !!fileObj.portada;
        portadaRadio.addEventListener('change', () => {
            archivosSeleccionados.forEach(f => f.portada = false);
            fileObj.portada = true;
            portadaHidden.value = idx;
            renderizarImagenes();
        });
        portadaLabel.appendChild(portadaRadio);
        portadaLabel.append(" Portada");

        const titulo = document.createElement('input');
        titulo.type = "text";
        titulo.className = "form-control form-control-sm mt-2";
        titulo.placeholder = "Título...";
        titulo.required = true;
        titulo.value = fileObj.titulo || "";
        titulo.addEventListener('input', e => {
            fileObj.titulo = e.target.value;
        });

        const hiddenTitulo = document.createElement('input');
        hiddenTitulo.type = "hidden";
        hiddenTitulo.name = "titulos[]";
        hiddenTitulo.value = fileObj.titulo || "";

        titulo.addEventListener('input', () => {
            hiddenTitulo.value = titulo.value;
        });

        div.appendChild(imgContainer);
        div.appendChild(portadaLabel);
        div.appendChild(titulo);
        div.appendChild(hiddenTitulo);
        contenedor.appendChild(div);
    });

    actualizarInputFiles();
    actualizarContador();
}


function eliminarImagen(idx) {
    const portadaIdx = archivosSeleccionados.findIndex(f => f.portada);
    if (idx === portadaIdx) {
        alert("No se puede eliminar la imagen marcada como portada.");
        return;
    }
    archivosSeleccionados.splice(idx, 1);
    renderizarImagenes();
}

function actualizarInputFiles() {
    const dt = new DataTransfer();
    archivosSeleccionados.forEach(f => dt.items.add(f.file));
    inputImagenes.files = dt.files;
}
function actualizarContador() {
    document.getElementById('file-count').textContent =
        archivosSeleccionados.length > 0
            ? `${archivosSeleccionados.length} imagen(es) seleccionada(s)`
            : "";
}

inputImagenes.addEventListener('change', e => {
    const nuevos = Array.from(e.target.files);

    if (archivosSeleccionados.length + nuevos.length > MAX_IMAGENES) {
        alert(`Solo puedes subir hasta ${MAX_IMAGENES} imágenes.`);
        return;
    }

    nuevos.forEach(file => {
        if (!file || !file.name) return;

        if (!extensionValida(file.name)) {
            alert(`Formato no permitido: ${file.name}\nPermitidas: ${EXT_PERMITIDAS.join(", ")}`);
            return;
        }

        if (file.size > MAX_BYTES) {
            alert(`El archivo ${file.name} supera el tamaño máximo de 5 MB`);
            return;
        }

        archivosSeleccionados.push({
            file,
            portada: archivosSeleccionados.length === 0,
            titulo: "",
        });
    });
    
    renderizarImagenes();
});

document.querySelector("form").addEventListener("submit", function(e) {

    if (archivosSeleccionados.length === 0) {
        e.preventDefault();
        alert("Debes subir al menos una imagen.");
        return;
    }

    for (const f of archivosSeleccionados) {
        if (!f.titulo || f.titulo.trim() === "") {
            e.preventDefault();
            alert("Cada imagen debe tener un título.");
            return;
        }
    }

    const portadaIdx = archivosSeleccionados.findIndex(f => f.portada);
    if (portadaIdx === -1) {
        e.preventDefault();
        alert("Debes seleccionar una imagen como portada.");
        return;
    }
});
</script>

<style>
body, label, legend, input, select, textarea {
    color: #111827 !important;
}
fieldset {
    border: 1px solid #E5E7EB;
    padding: 15px;
    border-radius: 10px;
}
.form-control, .form-select {
    background-color: white !important;
    color: #111827 !important;
    border: 1px solid #E5E7EB !important;
}
.form-control:focus, .form-select:focus {
    background-color: white !important;
    color: #111827 !important;
    border-color: #0D9488 !important;
    box-shadow: 0 0 0 3px rgba(13,148,136,0.1) !important;
}
.select2-container--default .select2-selection--multiple {
    background-color: white !important;
    border: 1px solid #E5E7EB !important;
}
.select2-container--default .select2-selection--multiple .select2-selection__choice {
    background-color: #CCFBF1 !important;
    color: #0F766E !important;
    border: none !important;
}
.select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
    color: #0F766E !important;
    margin-right: 4px;
}
.select2-dropdown {
    background-color: white !important;
    color: #111827 !important;
    border: 1px solid #E5E7EB !important;
}
.select2-results__option--highlighted {
    background-color: #0D9488 !important;
    color: white !important;
}
.imagen-item {
    background-color: #F9FAFB;
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    padding: 8px;
}
.imagen-item img {
    border: 2px solid #E5E7EB;
    border-radius: 6px;
}
.imagen-item img:hover { border-color: #0D9488; }
.custom-file-upload { position: relative; display: inline-block; }
.custom-file-upload input[type="file"] { display: none; }
.custom-file-upload .btn {
    cursor: pointer;
    background-color: #0D9488;
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: 600;
    transition: background-color 0.2s;
}
.custom-file-upload .btn:hover { background-color: #0F766E; }
#file-count { font-size: 0.9rem; color: #6B7280; }
::placeholder { color: #9CA3AF !important; opacity: 1; }
</style>
{% endblock %}
