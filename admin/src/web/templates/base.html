<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Athena — Autenticación{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            font-family: 'Inter', sans-serif !important;
            background: linear-gradient(135deg, #172554 0%, #1E3A8A 50%, #2563EB 100%) !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #111827 !important;
        }
        .main-content { flex: 1; }
        footer { background-color: rgba(0,0,0,0.15) !important; }
        footer small { color: rgba(255,255,255,0.6) !important; }
    </style>
</head>
<body>
    <header class="py-3 px-4 d-flex justify-content-between align-items-center" style="background:rgba(0,0,0,0.15);">
        <span style="font-family:'Nunito',sans-serif; font-size:1.3rem; font-weight:800; color:white;">
            Athena
        </span>
        <div class="d-flex gap-2">
            <a class="btn btn-sm" style="border:1px solid rgba(255,255,255,0.5); color:white; border-radius:8px;" href="{{ url_for('user_admin.login') }}">Iniciar Sesión</a>
            <a class="btn btn-sm" style="background:rgba(255,255,255,0.15); color:white; border:1px solid rgba(255,255,255,0.3); border-radius:8px;" href="{{ url_for('user_admin.register') }}">Registrarse</a>
        </div>
    </header>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <footer class="py-3 text-center">
        <small>&copy; 2025 Proyecto de Software 2025</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
