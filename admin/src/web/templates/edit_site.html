{% extends 'base_layout.html' %}

{% block title %}Editar Sitio Histórico{% endblock %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<section class="container mt-5">
    <article>
        <h2>Editar Sitio Histórico</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" enctype="multipart/form-data" action="{{ url_for('sitios.edit', id=sitio.id) }}">
            <fieldset>
                <legend>Datos del sitio</legend>

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" value="{{ sitio.nombre }}" required>
                </div>

                <div class="mb-3">
                    <label for="descripcion_breve" class="form-label">Descripción breve</label>
                    <input type="text" class="form-control" id="descripcion_breve" name="descripcion_breve" value="{{ sitio.descripcion_breve }}" required>
                </div>

                <div class="mb-3">
                    <label for="descripcion_completa" class="form-label">Descripción completa</label>
                    <textarea class="form-control" id="descripcion_completa" name="descripcion_completa" rows="3" required>{{ sitio.descripcion_completa }}</textarea>
                </div>

                <div class="mb-3">
                    <label for="ciudad" class="form-label">Ciudad</label>
                    <input type="text" class="form-control" id="ciudad" name="ciudad" value="{{ sitio.ciudad }}" required>
                </div>

                <div class="mb-3">
                    <label for="provincia" class="form-label">Provincia</label>
                    <input type="text" class="form-control" id="provincia" name="provincia" value="{{ sitio.provincia }}" required>
                </div>

                <div class="mb-3">
                    <label for="estado_conservacion" class="form-label">Estado de conservación</label>
                    <select class="form-select" id="estado_conservacion" name="estado_conservacion" required>
                        <option value="Bueno" {% if sitio.estado_conservacion=="Bueno" %}selected{% endif %}>Bueno</option>
                        <option value="Regular" {% if sitio.estado_conservacion=="Regular" %}selected{% endif %}>Regular</option>
                        <option value="Malo" {% if sitio.estado_conservacion=="Malo" %}selected{% endif %}>Malo</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="inauguracion" class="form-label">Año de inauguración</label>
                    <input type="number" class="form-control" id="inauguracion" name="inauguracion" value="{{ sitio.inauguracion }}" required>
                </div>

                <div class="mb-3">
                    <label for="categoria" class="form-label">Categoría</label>
                    <input type="text" class="form-control" id="categoria" name="categoria" value="{{ sitio.categoria }}" required>
                </div>

                <div class="mb-3">
                    <label for="tags" class="form-label">Tags</label>
                    <select id="tags" name="tags" class="form-select" multiple="multiple" style="width: 100%;">
                        {% for tag in tags %}
                        <option value="{{ tag.id }}" {% if tag in sitio.tags %}selected{% endif %}>{{ tag.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3 form-check mt-3">
                    <input type="checkbox" class="form-check-input" id="visible" name="visible" value="1" {% if sitio.visible %}checked{% endif %}>
                    <label class="form-check-label" for="visible">Visible</label>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ubicación en el mapa</label>
                    <div id="map" style="height: 400px; width: 100%;"></div>
                    <input type="hidden" name="latitud" id="latitud" value="{{ coordenadas.latitud }}">
                    <input type="hidden" name="longitud" id="longitud" value="{{ coordenadas.longitud }}">
                </div>

                <fieldset>
                <legend>Imágenes del sitio (máx. 10)</legend>

                <div class="mb-3 mt-2">
                    <div class="custom-file-upload">
                        <label for="imagenes" class="btn btn-primary">📁 Seleccionar imágenes</label>
                        <input type="file" id="imagenes" name="imagenes" multiple accept=".jpg,.png,.webp">
                        <span id="file-count" class="ms-2 text-info"></span>
                    </div>
                </div>
                <div id="imagenes-todas" style="margin-top: 15px;">
                    {% for img in imagenes_info %}
                    <div class="imagen-item bg-dark p-2 rounded" 
                        data-id="{{ img.id }}" 
                        data-url="{{ img.url }}" 
                        data-titulo="{{ img.titulo }}"
                        data-portada="{{ 'true' if img.es_portada else 'false' }}"
                        data-nueva="false"
                        style="display:inline-block; margin:10px; text-align:center; position:relative; vertical-align:top;">
                    </div>
                    {% endfor %}
                </div>

                <input type="hidden" name="portada" id="portada-hidden" value="0">
            </fieldset>

            <button type="submit" class="btn btn-success">Guardar cambios</button>
            <a href="{{ url_for('sitios.list') }}" class="btn btn-secondary">Cancelar</a>
            </form>
        </article>
    </section>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    $(document).ready(function() {
        $('#tags').select2({
            placeholder: "Selecciona uno o más tags",
            allowClear: true
        });
    });

    var map = L.map('map').setView([{{ coordenadas.latitud }}, {{ coordenadas.longitud }}], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);
    let marker = L.marker([{{ coordenadas.latitud }}, {{ coordenadas.longitud }}]).addTo(map);

    map.on('click', function(e) {
        if (marker) map.removeLayer(marker);
        marker = L.marker(e.latlng).addTo(map);
        document.getElementById('latitud').value = e.latlng.lat;
        document.getElementById('longitud').value = e.latlng.lng;
    });

    const inputImagenes = document.getElementById('imagenes');
    const contenedor = document.getElementById('imagenes-todas');
    const portadaHidden = document.getElementById('portada-hidden');
    let nuevasImagenes = [];
    let imagenesExistentes = [];

    const EXT_PERMITIDAS = ["jpg", "png", "webp"];
    const MAX_IMAGENES = 10;
    const MAX_BYTES = 5 * 1024 * 1024;

    // Inicializar imágenes existentes
    document.querySelectorAll('.imagen-item[data-id]').forEach(div => {
        imagenesExistentes.push({
            id: div.dataset.id,
            url: div.dataset.url,
            titulo: div.dataset.titulo || "",
            portada: div.dataset.portada === 'true',
            nueva: false
        });
    });

    function extensionValida(nombre) {
        const ext = nombre.split('.').pop().toLowerCase();
        return EXT_PERMITIDAS.includes(ext);
    }
    
    function actualizarInputFiles() {
        const dt = new DataTransfer();
        nuevasImagenes.forEach(img => {
            if (img.file instanceof File) {
                dt.items.add(img.file);
            }
        });
        inputImagenes.files = dt.files;
    }


    function renderizarImagenes() {
        contenedor.innerHTML = '';

        // Renderizar imágenes existentes
        imagenesExistentes.forEach((img, idx) => {
            const div = document.createElement('div');
            div.className = 'imagen-item bg-dark p-3 rounded';
            div.style.display = "inline-block";
            div.style.margin = "10px";
            div.style.textAlign = "center";
            div.style.position = "relative";
            div.style.verticalAlign = "top";
            div.style.width = "220px";

            const imgEl = document.createElement('img');
            imgEl.src = img.url;
            imgEl.width = 200;
            imgEl.height = 150;
            imgEl.style.objectFit = "cover";
            imgEl.style.borderRadius = "6px";
            div.appendChild(imgEl);

            if (!img.portada) {
                const boton = document.createElement('button');
                boton.type = "button";
                boton.textContent = "×";
                boton.className = "btn btn-danger btn-sm position-absolute top-0 end-0";
                boton.addEventListener('click', () => eliminarImagenExistente(img.id));
                div.appendChild(boton);
            }

            const label = document.createElement('label');
            label.style.display = "block";
            label.style.marginTop = "8px";
            label.style.textAlign = "center";
            label.style.color = "white";
            label.innerText = "Portada ";

            const radio = document.createElement('input');
            radio.type = "radio";
            radio.name = "portada_radio";
            radio.value = img.id;
            radio.checked = img.portada;
            radio.addEventListener('change', () => marcarComoPortadaExistente(img.id));
            label.appendChild(radio);
            div.appendChild(label);

            const titulo = document.createElement("input");
            titulo.type = "text";
            titulo.className = "form-control form-control-sm mt-2";
            titulo.placeholder = "Título...";
            titulo.required = true;
            titulo.value = img.titulo || "";
            titulo.addEventListener("input", e => img.titulo = e.target.value);

            const hiddenTitulo = document.createElement("input");
            hiddenTitulo.type = "hidden";
            hiddenTitulo.name = `titulos_existentes[${img.id}]`;
            hiddenTitulo.value = img.titulo || "";
            titulo.addEventListener("input", () => hiddenTitulo.value = titulo.value);

            div.appendChild(titulo);
            div.appendChild(hiddenTitulo);
            
            contenedor.appendChild(div);
        });

        // Renderizar imágenes nuevas
        nuevasImagenes.forEach((fileObj, idx) => {
        const div = document.createElement('div');
        div.className = 'imagen-item bg-dark p-3 rounded';
        div.style.display = "inline-block";
        div.style.margin = "10px";
        div.style.textAlign = "center";
        div.style.position = "relative";
        div.style.verticalAlign = "top";
        div.style.width = "220px";

        const imgEl = document.createElement('img');
        imgEl.src = URL.createObjectURL(fileObj.file);
        imgEl.width = 200;
        imgEl.height = 150;
        imgEl.style.objectFit = "cover";
        imgEl.style.borderRadius = "6px";
        div.appendChild(imgEl);

        if (!fileObj.portada) {
            const boton = document.createElement('button');
            boton.type = "button";
            boton.textContent = "×";
            boton.className = "btn btn-danger btn-sm position-absolute top-0 end-0";
            boton.addEventListener('click', () => eliminarNueva(idx));
            div.appendChild(boton);
        }

        const label = document.createElement('label');
        label.style.display = "block";
        label.style.marginTop = "8px";
        label.style.textAlign = "center";
        label.style.color = "white";
        label.innerText = "Portada ";

        const radio = document.createElement('input');
        radio.type = "radio";
        radio.name = "portada_radio";
        radio.value = "nueva-" + idx;
        radio.checked = fileObj.portada;
        radio.addEventListener('change', () => marcarComoPortadaNueva(idx));
        label.appendChild(radio);
        div.appendChild(label);

        const titulo = document.createElement("input");
        titulo.type = "text";
        titulo.className = "form-control form-control-sm mt-2 input-titulo-nueva";
        titulo.placeholder = "Título...";
        titulo.required = true;
        titulo.value = fileObj.titulo || "";

        const hiddenTitulo = document.createElement("input");
        hiddenTitulo.type = "hidden";
        hiddenTitulo.name = "titulos_nuevos[]";
        hiddenTitulo.value = fileObj.titulo || "";

        titulo.addEventListener("input", e => {
            fileObj.titulo = e.target.value;
            hiddenTitulo.value = fileObj.titulo;
        });

        div.appendChild(titulo);
        div.appendChild(hiddenTitulo);

        contenedor.appendChild(div);
    });

        actualizarContador();
        actualizarInputFiles();
    }


    function eliminarNueva(idx) {
        if (nuevasImagenes[idx].portada) {
            alert("No se puede eliminar la imagen marcada como portada.");
            return;
        }
        
        nuevasImagenes.splice(idx, 1);
        renderizarImagenes();
    }

    function eliminarImagenExistente(id) {
        const img = imagenesExistentes.find(f => f.id === id);
        if (img?.portada) {
            alert("No se puede eliminar la imagen marcada como portada.");
            return;
        }

        if (confirm("¿Deseas eliminar esta imagen existente?")) {
            const hiddenInput = document.createElement('input');
            hiddenInput.type = "hidden";
            hiddenInput.name = "eliminar_imagenes[]";
            hiddenInput.value = id;
            document.querySelector('form').appendChild(hiddenInput);

            imagenesExistentes = imagenesExistentes.filter(f => f.id !== id);
            renderizarImagenes();
        }
    }

    function marcarComoPortadaNueva(idx) {
        imagenesExistentes.forEach(img => img.portada = false);
        nuevasImagenes.forEach(f => f.portada = false);
        nuevasImagenes[idx].portada = true;
        portadaHidden.value = "nueva-" + idx;
        renderizarImagenes();
    }

    function marcarComoPortadaExistente(id) {
        imagenesExistentes.forEach(img => img.portada = (img.id === id));
        nuevasImagenes.forEach(f => f.portada = false);
        portadaHidden.value = id;
        renderizarImagenes();
    }

    function actualizarContador() {
        document.getElementById('file-count').textContent =
            (nuevasImagenes.length + imagenesExistentes.length) > 0
                ? `${nuevasImagenes.length + imagenesExistentes.length} imagen(es) en total`
                : "";
    }

    inputImagenes.addEventListener('change', (e) => {
        const nuevos = Array.from(e.target.files);

        if (nuevasImagenes.length + imagenesExistentes.length + nuevos.length > MAX_IMAGENES) {
            alert(`Solo puedes subir hasta ${MAX_IMAGENES} imágenes en total.`);
            return;
        }
        
        nuevos.forEach(file => {
            if (!extensionValida(file.name)) {
                alert(`Formato no permitido: ${file.name}\nPermitidas: ${EXT_PERMITIDAS.join(", ")}`);
                return;
            }
            if (file.size > MAX_BYTES) {
                alert(`El archivo ${file.name} supera el tamaño máximo de 5 MB`);
                return;
            }

            nuevasImagenes.push({
                file,
                portada: nuevasImagenes.length === 0 && imagenesExistentes.every(f => !f.portada),
                titulo: "",
            });
        });

        renderizarImagenes();
    });
    document.querySelector("form").addEventListener("submit", function(e) {

    let haySinTitulo = false;

    imagenesExistentes.forEach(img => {
        if (!img.titulo || img.titulo.trim() === "") {
            haySinTitulo = true;
        }
    });

    nuevasImagenes.forEach(img => {
        if (!img.titulo || img.titulo.trim() === "") {
            haySinTitulo = true;
        }
    });

    if (haySinTitulo) {
        e.preventDefault();
        alert("Todas las imágenes deben tener un título antes de guardar.");
        return false;
    }
});
    renderizarImagenes();
</script>

    <style>
        body, label, legend, input, select, textarea { color: #111827 !important; }
        fieldset { border: 1px solid #E5E7EB; padding: 15px; border-radius: 10px; }
        .form-control, .form-select {
            background-color: white !important;
            color: #111827 !important;
            border: 1px solid #E5E7EB !important;
        }
        .form-control:focus, .form-select:focus {
            background-color: white !important;
            color: #111827 !important;
            border-color: #1E3A8A !important;
            box-shadow: 0 0 0 3px rgba(30,58,138,0.1) !important;
        }
        .select2-container--default .select2-selection--multiple {
            background-color: white !important;
            border: 1px solid #E5E7EB !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background-color: #DBEAFE !important;
            color: #172554 !important;
            border: none !important;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
            color: #172554 !important;
            margin-right: 4px;
        }
        .select2-dropdown {
            background-color: white !important;
            color: #111827 !important;
            border: 1px solid #E5E7EB !important;
        }
        .select2-results__option--highlighted {
            background-color: #1E3A8A !important;
            color: white !important;
        }
        .imagen-item {
            background-color: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 8px;
        }
        .imagen-item img { border: 2px solid #E5E7EB; border-radius: 6px; }
        .imagen-item img:hover { border-color: #1E3A8A; }
        .custom-file-upload { position: relative; display: inline-block; }
        .custom-file-upload input[type="file"] { display: none;
        }

        .custom-file-upload .btn {
            cursor: pointer;
            background-color: #1E3A8A;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .custom-file-upload .btn:hover { background-color: #172554; }
        #file-count { font-size: 0.9rem; color: #6B7280; }
        ::placeholder { color: #9CA3AF !important; opacity: 1; }
    </style>
{% endblock %}
